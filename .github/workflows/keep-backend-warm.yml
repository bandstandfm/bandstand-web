# Pings the Bandstand FastAPI backend on Emergent every 5 minutes to keep
# the container from being put to sleep by the platform's idle timeout.
# See the 2026-06-09 chat for the diagnostic write-up.

name: keep-backend-warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: keep-backend-warm
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping backend /api/venues
        run: |
          set -e
          URL="https://live-jazz-chicago.preview.emergentagent.com/api/venues"
          echo "Pinging $URL at $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          UA="Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/130.0.0.0 Safari/537.36"
          for attempt in 1 2; do
            HTTP=$(curl -sS -o /tmp/r -w '%{http_code}' --max-time 25 -A "$UA" "$URL") || HTTP="000"
            BYTES=$(wc -c < /tmp/r)
            echo "Attempt $attempt: HTTP=$HTTP bytes=$BYTES"
            if [ "$HTTP" = "200" ] && [ "$BYTES" -gt 1000 ]; then
              echo "Backend is awake."
              exit 0
            fi
            if [ "$attempt" -lt 2 ]; then
              echo "Sleeping 10s before retry (likely waking from idle)..."
              sleep 10
            fi
          done
          echo "::warning::Backend did not respond with HTTP 200 after 2 attempts. Last status: $HTTP. Body preview:"
          head -c 200 /tmp/r || true
          echo ""
          exit 0
